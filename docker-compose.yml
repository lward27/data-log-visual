services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-datalog_visual}
      POSTGRES_USER: ${POSTGRES_USER:-datalog_visual}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-datalog_visual}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data

  backend:
    build:
      context: ./backend
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://datalog_visual:datalog_visual@postgres:5432/datalog_visual}
      UPLOAD_ROOT: /app/uploads
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:5173}
      COOKIE_SECURE: "false"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      - postgres
    ports:
      - "8000:8000"

  frontend:
    image: node:20-alpine
    working_dir: /app
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 5173"
    environment:
      VITE_API_BASE_PATH: /api
    volumes:
      - ./frontend:/app
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres-data:
