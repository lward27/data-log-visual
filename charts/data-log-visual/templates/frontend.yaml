apiVersion: v1
kind: Service
metadata:
  name: {{ include "data-log-visual.frontendName" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "data-log-visual.frontendName" . }}
  ports:
    - name: http
      port: {{ .Values.frontend.service.port }}
      targetPort: 80
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-log-visual.frontendName" . }}
spec:
  replicas: {{ .Values.frontend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "data-log-visual.frontendName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "data-log-visual.frontendName" . }}
    spec:
      containers:
        - name: frontend
          image: "{{ .Values.frontend.image.repository }}:{{ .Values.frontend.image.tag }}"
          imagePullPolicy: {{ .Values.frontend.image.pullPolicy }}
          ports:
            - containerPort: 80
          readinessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /
              port: 80
            initialDelaySeconds: 5
            periodSeconds: 30
