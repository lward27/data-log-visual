apiVersion: v1
kind: Service
metadata:
  name: {{ include "data-log-visual.backendName" . }}
spec:
  selector:
    app.kubernetes.io/name: {{ include "data-log-visual.backendName" . }}
  ports:
    - name: http
      port: {{ .Values.backend.service.port }}
      targetPort: 8000
  type: ClusterIP
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "data-log-visual.backendName" . }}
spec:
  replicas: {{ .Values.backend.replicaCount }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "data-log-visual.backendName" . }}
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "data-log-visual.backendName" . }}
    spec:
      containers:
        - name: backend
          image: "{{ .Values.backend.image.repository }}:{{ .Values.backend.image.tag }}"
          imagePullPolicy: {{ .Values.backend.image.pullPolicy }}
          env:
            - name: UPLOAD_ROOT
              value: {{ .Values.backend.env.uploadRoot | quote }}
            - name: CORS_ORIGINS
              value: {{ .Values.backend.env.corsOrigins | quote }}
            - name: COOKIE_SECURE
              value: {{ .Values.backend.env.cookieSecure | quote }}
            - name: PGHOST
              value: {{ .Values.backend.env.pgHost | quote }}
            - name: PGPORT
              value: {{ .Values.backend.env.pgPort | quote }}
            - name: PGDATABASE
              value: {{ .Values.backend.env.pgDatabase | quote }}
            - name: PGUSER
              value: {{ .Values.backend.env.pgUser | quote }}
            - name: PGPASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.backend.passwordSecret.name }}
                  key: {{ .Values.backend.passwordSecret.key }}
          ports:
            - containerPort: 8000
          volumeMounts:
            - name: uploads
              mountPath: {{ .Values.backend.env.uploadRoot | quote }}
          readinessProbe:
            httpGet:
              path: /api/healthz
              port: 8000
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 8000
            initialDelaySeconds: 10
            periodSeconds: 30
          resources:
{{ toYaml .Values.backend.resources | indent 12 }}
      volumes:
        - name: uploads
          persistentVolumeClaim:
            claimName: {{ include "data-log-visual.name" . }}-uploads
